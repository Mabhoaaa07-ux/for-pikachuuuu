<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>For You ❤️</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui, -apple-system, Segoe UI, sans-serif;
}

body{
  overflow:hidden;
  background:black;
  color:white;
}

/* ---------- CANVAS LAYERS ---------- */
#fxCanvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

/* ---------- SCENES ---------- */
.scene{
  position:absolute;
  width:100%;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  opacity:0;
  pointer-events:none;
  transition:1.5s ease;
  z-index:2;
  padding:20px;
}

.scene.active{
  opacity:1;
  pointer-events:auto;
}

/* ---------- GLASS CARD ---------- */
.glass{
  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:20px;
  padding:20px;
  width:90%;
  max-width:420px;
}

/* ---------- TEXT ---------- */
h1,h2{
  font-weight:600;
}

.glow{
  font-size:1.6rem;
  text-shadow:0 0 20px pink;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1); opacity:0.8}
  50%{transform:scale(1.05); opacity:1}
}

/* ---------- BUTTONS ---------- */
button{
  margin-top:15px;
  padding:12px 18px;
  border:none;
  border-radius:30px;
  font-size:16px;
  font-weight:500;
  cursor:pointer;
  background:linear-gradient(45deg,#ff4d6d,#ffb3c1);
  color:white;
  box-shadow:0 10px 25px rgba(255,0,100,0.3);
}

button:active{
  transform:scale(0.95);
}

/* ---------- GIFT ---------- */
.gift{
  font-size:90px;
  animation:float 2s infinite ease-in-out;
  filter: drop-shadow(0 0 20px pink);
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-15px)}
}

/* ---------- SLIDER ---------- */
.slider{
  width:95%;
  height:70vh;
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  opacity:0;
  transform:scale(1.2);
  transition:2s ease;
  filter:brightness(0.8);
}

.slide.active{
  opacity:1;
  transform:scale(1);
}

/* ---------- LETTER ---------- */
.letter{
  font-size:15px;
  line-height:1.6;
  white-space:pre-line;
  text-align:left;
}

/* ---------- RING ---------- */
.ring{
  font-size:90px;
  animation:spin 3s linear infinite;
  filter:drop-shadow(0 0 15px gold);
}

@keyframes spin{
  from{transform:rotateY(0deg)}
  to{transform:rotateY(360deg)}
}

/* ---------- NO BUTTON ---------- */
#noBtn{
  position:relative;
}

/* ---------- HEART POP ---------- */
.heart{
  position:absolute;
  font-size:18px;
  animation:rise 4s linear forwards;
}

@keyframes rise{
  to{
    transform:translateY(-800px);
    opacity:0;
  }
}
</style>
</head>

<body>

<canvas id="fxCanvas"></canvas>

<!-- SCENE 1 -->
<div class="scene active" id="s1">
  <div class="glass">
    <div class="glow">Hey Pikachuuuu ❤️</div>
    <p style="margin-top:10px;">Someone loves you more than words can explain...</p>
    <button onclick="go(2)">Open Gift 🎁</button>
  </div>
</div>

<!-- SCENE 2 -->
<div class="scene" id="s2">
  <div class="gift">🎁</div>
  <button onclick="openGift()">Tap to Open</button>
</div>

<!-- SCENE 3 -->
<div class="scene" id="s3">
  <div class="slider">
    <div class="slide active" style="background-image:url('assets/photo.1.jpeg')"></div>   
    <div class="slide" style="background-image:url('assets/photo.2.jpeg')"></div>
    <div class="slide" style="background-image:url('assets/photo.3.jpeg')"></div>
    <div class="slide" style="background-image:url('assets/photo.4.jpeg')"></div>
    <div class="slide" style="background-image:url('assets/photo.5.jpeg')"></div>
    <div class="slide" style="background-image:url('assets/photo.6.jpeg')"></div>
    <div class="slide" style="background-image:url('assets/photo.7.jpeg')"></div>
    <div class="slide" style="background-image:url('assets/photo.8.jpeg')"></div>
    <div class="slide" style="background-image:url('assets/photo.9.jpeg')"></div>
    <div class="slide" style="background-image:url('assets/photo.10.jpeg')"></div>
    
  </div>
</div>

<!-- SCENE 4 -->
<div class="scene" id="s4">
  <div class="glass letter" id="letter"></div>
</div>

<!-- SCENE 5 -->
<div class="scene" id="s5">
  <div class="ring">💍</div>
  <h2>Will you marry me?</h2>
  <button onclick="yes()">YES ❤️</button>
  <button id="noBtn" onmouseover="runNo()">NO</button>
</div>

<!-- SCENE 6 -->
<div class="scene" id="s6">
  <h1>Thank you ❤️</h1>
  <p>Forever Yours</p>
</div>

<script>
let scene = 1;

function go(n){
  document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
  scene = n;
}

/* ---------- GIFT FLOW ---------- */
function openGift(){
  go(3);
  startSlider();

  setTimeout(()=>{
    typeLetter();
  },6000);
}

/* ---------- SLIDER ---------- */
let i=0;
function startSlider(){
  setInterval(()=>{
    let slides=document.querySelectorAll('.slide');
    slides.forEach(s=>s.classList.remove('active'));
    i=(i+1)%slides.length;
    slides[i].classList.add('active');
  },2500);
}

/* ---------- TYPE LETTER ---------- */
const msg = `I'm sorry.

I know I haven't always been perfect.

But every mistake taught me one thing —
I never want to lose you.

I promise to love you better every day.`;

function typeLetter(){
  go(4);
  let el=document.getElementById("letter");
  el.innerHTML="";
  let j=0;

  let t=setInterval(()=>{
    el.innerHTML += msg[j]==="\n"?"<br>":msg[j];
    j++;
    if(j>=msg.length){
      clearInterval(t);
      setTimeout(()=>go(5),3000);
    }
  },35);
}

/* ---------- NO BUTTON ESCAPE ---------- */
function runNo(){
  let b=document.getElementById("noBtn");
  b.style.position="absolute";
  b.style.top=Math.random()*200+"px";
  b.style.left=Math.random()*200+"px";
}

/* ---------- YES ---------- */
function yes(){
  go(6);
  heartRain();
  burstFX();
}

/* ---------- HEART RAIN ---------- */
function heartRain(){
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.top="90vh";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),4000);
  },120);
}

/* ---------- CANVAS FX (CONFETTI + STARS) ---------- */
const canvas=document.getElementById("fxCanvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<120;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    d:Math.random()*1+0.5
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(255,255,255,0.8)";

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    p.y+=p.d;

    if(p.y>canvas.height){
      p.y=0;
      p.x=Math.random()*canvas.width;
    }
  });

  requestAnimationFrame(draw);
}
draw();

/* ---------- BURST ---------- */
function burstFX(){
  setInterval(()=>{
    let spark=document.createElement("div");
    spark.innerHTML="✨";
    spark.style.position="absolute";
    spark.style.left=Math.random()*100+"vw";
    spark.style.top=Math.random()*100+"vh";
    spark.style.fontSize="25px";
    spark.style.zIndex=10;
    document.body.appendChild(spark);
    setTimeout(()=>spark.remove(),1000);
  },120);
}
</script>

</body>
</html>
